name: Deploy on self-hosted runner

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy app
        run: |
          cd /var/www/sergio
          chmod +x scripts/deploy.sh scripts/fix-pm2-backend.sh
          APP_DIR=/var/www/sergio PM2_APP_NAME=sergio-backend API_URL=https://sergio-ind.com/api DEPLOY_USER=deploy bash scripts/deploy.sh
