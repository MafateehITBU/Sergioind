# Example nginx config for Sergioind on Hostinger VPS.
# Copy to: /etc/nginx/sites-available/sergioind
# Then: ln -s /etc/nginx/sites-available/sergioind /etc/nginx/sites-enabled/
# Test and reload: nginx -t && systemctl reload nginx

upstream sergioind_api {
    server 127.0.0.1:5001;
    keepalive 64;
}

# Public website
server {
    listen 80;
    listen [::]:80;
    server_name sergio-ind.com www.sergio-ind.com;

    root /var/www/sergio/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://sergioind_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location /uploads/ {
        proxy_pass http://sergioind_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Admin dashboard
server {
    listen 80;
    listen [::]:80;
    server_name dashboard.sergio-ind.com;

    root /var/www/sergio/dashboard/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
